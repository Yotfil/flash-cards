<app-modal [label]="title()" size="sm" [pending]="pending()" (dismissed)="cancelled.emit()">
  <h2 class="text-lg font-semibold text-text-primary">{{ title() }}</h2>
  @if (message(); as text) {
    <p class="mt-2 text-sm text-text-secondary">{{ text }}</p>
  }
  <div class="mt-6 flex justify-end gap-3">
    <button
      type="button"
      [disabled]="pending()"
      (click)="cancelled.emit()"
      class="rounded-lg border border-border bg-surface px-4 py-2 text-sm font-medium text-text-primary transition-colors hover:bg-surface-sunken disabled:opacity-50"
    >
      {{ cancelLabel() }}
    </button>
    <button
      type="button"
      [disabled]="pending()"
      (click)="confirmed.emit()"
      class="rounded-lg bg-danger px-4 py-2 text-sm font-medium text-danger-contrast transition-opacity hover:opacity-90 disabled:opacity-50"
    >
      @if (pending()) {
        {{ pendingLabel() }}
      } @else {
        {{ confirmLabel() }}
      }
    </button>
  </div>
</app-modal>
