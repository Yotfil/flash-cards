<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Flash-cards</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Color de la barra del navegador, coherente con los tokens (claro/oscuro). -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf9f7" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#161512" />

    <!-- Instalable en iOS (Safari no usa el manifest para esto). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Flash-cards" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
  </head>
  <body>
    <app-root></app-root>
    <noscript>Activa JavaScript para usar la aplicación.</noscript>
  </body>
</html>
