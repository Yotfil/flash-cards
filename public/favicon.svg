<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo de la app: libro abierto con chispa de aprendizaje">
  <defs>
    <!-- Fondo: teal sereno con sutil profundidad -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15A89B"/>
      <stop offset="1" stop-color="#0B746B"/>
    </linearGradient>
    <!-- Sombra suave bajo el libro para asentarlo -->
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- Tile redondeado (estilo app icon / favicon) -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Sombra de apoyo -->
  <ellipse cx="256" cy="380" rx="126" ry="18" fill="#063B37" opacity="0.22" filter="url(#soft)"/>

  <!-- Libro abierto: dos páginas que se abren desde el lomo central -->
  <!-- Página izquierda -->
  <path d="M250 300 Q178 252 106 248 L94 324 Q172 332 250 368 Z" fill="#FBF6EC"/>
  <!-- Página derecha -->
  <path d="M262 300 Q334 252 406 248 L418 324 Q340 332 262 368 Z" fill="#FBF6EC"/>

  <!-- Líneas de texto sugeridas (muy sutiles), refuerzan la lectura de "libro" -->
  <path d="M132 282 Q190 270 238 296" fill="none" stroke="#15A89B" stroke-width="9" stroke-linecap="round" opacity="0.55"/>
  <path d="M380 282 Q322 270 274 296" fill="none" stroke="#15A89B" stroke-width="9" stroke-linecap="round" opacity="0.55"/>

  <!-- Chispa de aprendizaje surgiendo del libro -->
  <path d="M256 96 Q256 152 318 152 Q256 152 256 208 Q256 152 194 152 Q256 152 256 96 Z" fill="#F7C873"/>
  <!-- Mini chispa secundaria, da vida sin romper la calma -->
  <circle cx="338" cy="120" r="11" fill="#F7C873" opacity="0.9"/>
</svg>
